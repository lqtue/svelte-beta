<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VMA — Interactive Knowledge Graph</title>
<script
  src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"
  crossorigin="anonymous"
  onerror="document.body && document.body.insertAdjacentHTML('afterbegin', '<div style=&quot;background:#7f1d1d;color:#fff;padding:8px 12px;font:13px monospace&quot;>Failed to load cytoscape from jsdelivr. Check network/extensions.</div>')"
></script>
<style>
  :root {
    --bg: #0f0f10;
    --panel: #18181b;
    --panel-2: #232327;
    --border: #2a2a2f;
    --fg: #e9e9ec;
    --fg-dim: #9a9aa3;
    --accent: #ffd166;
  }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif; }
  #app { display: grid; grid-template-columns: 260px 1fr 320px; height: 100vh; }
  aside { background: var(--panel); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
  aside.right { border-right: none; border-left: 1px solid var(--border); }
  h1 { font-size: 14px; margin: 0 0 4px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); }
  h2 { font-size: 11px; margin: 18px 0 8px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-dim); }
  p.sub { font-size: 12px; color: var(--fg-dim); margin: 0 0 12px; line-height: 1.5; }
  .legend { display: flex; flex-direction: column; gap: 6px; }
  .legend label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; user-select: none; padding: 4px 6px; border-radius: 4px; }
  .legend label:hover { background: var(--panel-2); }
  .legend input { accent-color: var(--accent); }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  #net { background: #131316; }
  input[type="search"] { width: 100%; box-sizing: border-box; padding: 8px 10px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 13px; }
  input[type="search"]:focus { outline: none; border-color: var(--accent); }
  .detail { font-size: 13px; line-height: 1.55; }
  .detail .label { color: var(--accent); font-weight: 600; font-size: 14px; }
  .detail .meta { color: var(--fg-dim); font-size: 12px; margin-bottom: 12px; }
  .detail code { background: var(--panel-2); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .neighbors { margin-top: 14px; }
  .neighbor { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 12px; cursor: pointer; }
  .neighbor:hover { color: var(--accent); }
  .neighbor .arrow { color: var(--fg-dim); font-family: monospace; }
  .controls { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  button { background: var(--panel-2); color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  .stats { font-size: 11px; color: var(--fg-dim); margin-top: 12px; }
</style>
</head>
<body>
<div id="app">
  <aside>
    <h1>VMA Knowledge Graph</h1>
    <p class="sub">Architecture map: routes, components, stores, tables, pipelines, external services. Drag nodes. Click a node for details. Scroll to zoom.</p>

    <h2>Filter by type</h2>
    <div class="legend" id="legend"></div>

    <h2>Search</h2>
    <input id="search" type="search" placeholder="Find a node…" autocomplete="off" />

    <h2>View</h2>
    <div class="controls">
      <button id="btn-fit">Fit</button>
      <button id="btn-layout-concentric">Rings</button>
      <button id="btn-layout-cose">Force</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div class="stats" id="stats"></div>
  </aside>

  <div id="net"></div>

  <aside class="right">
    <h1>Detail</h1>
    <p class="sub" id="hint">Click any node to inspect its role and connections.</p>
    <div class="detail" id="detail" style="display:none"></div>
  </aside>
</div>

<script>
// On-page error banner so failures aren't invisible.
function showError(msg) {
  let bar = document.getElementById("errbar");
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "errbar";
    bar.style.cssText = "position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fff;padding:8px 12px;font:13px/1.4 monospace;z-index:9999;white-space:pre-wrap";
    document.body.appendChild(bar);
  }
  bar.textContent = (bar.textContent ? bar.textContent + "\n" : "") + msg;
}
window.addEventListener("error", (e) => {
  // Swallow benign vis-network ResizeObserver loop warning, surface everything else.
  if (typeof e.message === "string" && e.message.includes("ResizeObserver loop")) {
    e.stopImmediatePropagation(); e.preventDefault(); return;
  }
  showError("Error: " + (e.message || e) + (e.filename ? "  @ " + e.filename + ":" + e.lineno : ""));
});
window.addEventListener("unhandledrejection", (e) => showError("Promise rejection: " + (e.reason && e.reason.message || e.reason)));

if (typeof cytoscape === "undefined") {
  showError("cytoscape failed to load. Check network / extensions blocking cdn.jsdelivr.net.");
}

  E("x:R2Worker", "x:CFPages", "Cloudflare"),
];

// ---------- Wiring (Cytoscape.js) ----------
if (typeof cytoscape === "undefined") {
  showError("cytoscape library did not load — see network/console.");
}

// Tier assignment: 1 = main hub, 2 = mid-tier, 3 = leaf. Used for node size + layout ring.
const MAIN = new Set([
  "c:MapShell", "c:ImageShell",
  "t:maps", "t:map_pipeline_status",
  "x:Supabase", "x:Allmaps", "x:R2Worker",
  "p:OCR", "p:MapSAM2",
  "s:mapStore",
  "r:/catalog", "r:/contribute/digitalize", "r:/view", "r:/contribute/trace",
]);
const MID = new Set([
  "c:MapEditModal", "c:HistoricalOverlay", "c:TriageTool", "c:OcrBboxTool", "c:ReviewCanvas", "c:TraceTool",
  "c:ViewMode", "c:CreateMode", "c:AnnotateMode",
  "t:map_iiif_sources", "t:footprint_submissions", "t:ocr_extractions", "t:label_tasks", "t:scout_candidates",
  "s:layerStore", "s:urlStore",
  "m:maps", "m:supabase", "m:iiif",
  "a:/api/admin/maps", "a:/api/admin/maps/[id]", "a:scout", "a:search", "a:pipeline", "a:mirror-r2", "a:ocr-review",
  "x:OpenLayers", "x:Internet Archive", "x:CFPages", "x:Gemini",
  "r:/admin/scout", "r:/admin/bulk", "r:/contribute/review", "r:/annotate", "r:/contribute/georef",
]);
function tierOf(id) { return MAIN.has(id) ? 1 : MID.has(id) ? 2 : 3; }

const cyNodes = nodes.map(n => ({
  data: {
    id: n.id, label: n.label, group: n.group, detail: n.detail || "",
    color: groups[n.group].color, tier: tierOf(n.id),
  }
}));
const cyEdges = edges.map((e, i) => ({
  data: { id: "e" + i, source: e.from, target: e.to, label: e.label || "" }
}));

const cy = cytoscape({
  container: document.getElementById("net"),
  elements: { nodes: cyNodes, edges: cyEdges },
  wheelSensitivity: 0.2,
  style: [
    {
      selector: "node",
      style: {
        "background-color": "data(color)",
        "label": "data(label)",
        "color": "#0a0a0a",
        "font-family": "Inter, system-ui, sans-serif",
        "font-weight": 600,
        "text-valign": "center",
        "text-halign": "center",
        "text-wrap": "wrap",
        "shape": "round-rectangle",
        "width": "label",
        "height": "label",
        "border-width": 1,
        "border-color": "#000",
        // Size by tier
        "font-size": "mapData(tier, 1, 3, 17, 10)",
        "padding": "mapData(tier, 1, 3, 14, 5)",
        "text-max-width": "mapData(tier, 1, 3, 200, 110)",
      },
    },
    {
      selector: "node[tier = 1]",
      style: { "border-width": 2, "border-color": "#000" },
    },
    {
      selector: "node[tier = 3]",
      style: { "opacity": 0.92 },
    },
    {
      selector: "node:selected",
      style: { "border-width": 3, "border-color": "#ffd166" },
    },
    {
      selector: "node.dim",
      style: { "opacity": 0.12 },
    },
    {
      selector: "node.hidden",
      style: { "display": "none" },
    },
    {
      selector: "edge",
      style: {
        "width": 1,
        "line-color": "#3a3a40",
        "target-arrow-color": "#3a3a40",
        "target-arrow-shape": "triangle",
        "arrow-scale": 0.9,
        "curve-style": "bezier",
        "label": "data(label)",
        "font-size": 9,
        "color": "#7a7a82",
        "text-rotation": "autorotate",
        "text-background-color": "#131316",
        "text-background-opacity": 0.85,
        "text-background-padding": 1,
      },
    },
    {
      selector: "edge.hl",
      style: { "line-color": "#ffd166", "target-arrow-color": "#ffd166", "width": 2, "z-index": 999 },
    },
    {
      selector: "edge.dim",
      style: { "opacity": 0.08 },
    },
    {
      selector: "edge.hidden",
      style: { "display": "none" },
    },
  ],
  layout: concentricLayout(),
});

function concentricLayout() {
  return {
    name: "concentric",
    concentric: (n) => 4 - n.data("tier"), // tier 1 → ring 3 (innermost = highest)
    levelWidth: () => 1,
    minNodeSpacing: 28,
    spacingFactor: 1.1,
    avoidOverlap: true,
    startAngle: -Math.PI / 2,
    padding: 40,
    animate: false,
  };
}
function coseLayout() {
  return {
    name: "cose", animate: false, nodeRepulsion: 9000, idealEdgeLength: 120,
    gravity: 0.25, numIter: 1500, padding: 30, randomize: false,
  };
}

cy.ready(() => cy.fit(null, 40));

// Legend
const legendEl = document.getElementById("legend");
Object.entries(groups).forEach(([key, g]) => {
  const row = document.createElement("label");
  row.innerHTML = `<input type="checkbox" checked data-group="${key}"><span class="swatch" style="background:${g.color}"></span>${g.label}`;
  legendEl.appendChild(row);
});

const activeGroups = new Set(Object.keys(groups));
legendEl.addEventListener("change", (e) => {
  const t = e.target;
  if (!t.matches('input[type="checkbox"]')) return;
  const g = t.dataset.group;
  if (t.checked) activeGroups.add(g); else activeGroups.delete(g);
  applyFilter();
});

function applyFilter() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  cy.batch(() => {
    cy.nodes().forEach(n => {
      const d = n.data();
      const groupOk = activeGroups.has(d.group);
      const searchOk = !q || d.label.toLowerCase().includes(q) || (d.detail || "").toLowerCase().includes(q);
      const visible = groupOk && searchOk;
      n.toggleClass("hidden", !visible);
    });
    cy.edges().forEach(e => {
      const hide = e.source().hasClass("hidden") || e.target().hasClass("hidden");
      e.toggleClass("hidden", hide);
    });
  });
}

document.getElementById("search").addEventListener("input", applyFilter);

// Detail panel
function highlight(id) {
  cy.elements().removeClass("hl dim");
  if (!id) return;
  const node = cy.getElementById(id);
  if (!node || node.empty()) return;
  const connected = node.connectedEdges();
  const neighbors = connected.connectedNodes();
  const focused = node.union(neighbors).union(connected);
  cy.elements().not(focused).addClass("dim");
  connected.addClass("hl");
}

function showDetail(id) {
  const node = cy.getElementById(id);
  if (!node || node.empty()) return;
  const d = node.data();
  const incoming = node.incomers("edge");
  const outgoing = node.outgoers("edge");
  const neighborHtml = (col, dir) => col.map(e => {
    const other = dir === "out" ? e.target() : e.source();
    const od = other.data();
    const arrow = dir === "out" ? "→" : "←";
    const lbl = e.data("label");
    return `<div class="neighbor" data-id="${od.id}"><span class="arrow">${arrow}</span> ${od.label}${lbl ? ` <span style="color:#666">(${lbl})</span>` : ""}</div>`;
  }).join("");

  const html = `
    <div class="label">${d.label}</div>
    <div class="meta">${groups[d.group].label}</div>
    <div>${d.detail || "<em style='color:#666'>No detail.</em>"}</div>
    <div class="neighbors">
      ${outgoing.length ? `<h2 style="margin-top:14px">Outgoing (${outgoing.length})</h2>${neighborHtml(outgoing, "out")}` : ""}
      ${incoming.length ? `<h2 style="margin-top:14px">Incoming (${incoming.length})</h2>${neighborHtml(incoming, "in")}` : ""}
    </div>
  `;
  document.getElementById("hint").style.display = "none";
  const panel = document.getElementById("detail");
  panel.style.display = "block";
  panel.innerHTML = html;
  panel.querySelectorAll(".neighbor").forEach(el => {
    el.addEventListener("click", () => {
      const tid = el.dataset.id;
      cy.$(":selected").unselect();
      cy.getElementById(tid).select();
      cy.animate({ fit: { eles: cy.getElementById(tid), padding: 200 }, duration: 350 });
      highlight(tid);
      showDetail(tid);
    });
  });
  highlight(id);
}

cy.on("tap", "node", (e) => showDetail(e.target.id()));
cy.on("tap", (e) => {
  if (e.target === cy) {
    cy.elements().removeClass("hl dim");
    document.getElementById("hint").style.display = "block";
    document.getElementById("detail").style.display = "none";
  }
});

// Controls
document.getElementById("btn-fit").onclick = () => cy.animate({ fit: { padding: 40 }, duration: 400 });
document.getElementById("btn-layout-concentric").onclick = () => cy.layout({ ...concentricLayout(), animate: true, animationDuration: 500 }).run();
document.getElementById("btn-layout-cose").onclick = () => cy.layout({ ...coseLayout(), animate: true, animationDuration: 500 }).run();
document.getElementById("btn-reset").onclick = () => {
  document.getElementById("search").value = "";
  legendEl.querySelectorAll("input").forEach(i => { i.checked = true; activeGroups.add(i.dataset.group); });
  applyFilter();
  cy.elements().removeClass("hl dim");
  cy.animate({ fit: { padding: 40 }, duration: 400 });
};

document.getElementById("stats").textContent = `${nodes.length} nodes · ${edges.length} edges`;
</script>
</body>
</html>
